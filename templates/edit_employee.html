{% extends "base.html" %}

{% block title %}Редактирование сотрудника{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Главная</a></li>
                <li class="breadcrumb-item"><a href="/employees">Сотрудники</a></li>
                <li class="breadcrumb-item active">Редактирование</li>
            </ol>
        </nav>
        <h1>Редактирование сотрудника</h1>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Редактировать данные</h5>
            </div>
            <div class="card-body">
                <form id="editEmployeeForm">
                    <div class="mb-3">
                        <label class="form-label">ФИО *</label>
                        <input type="text" name="Full_name" class="form-control" value="{{ employee.Full_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Должность *</label>
                        <input type="text" name="Position" class="form-control" value="{{ employee.Position }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" name="email" class="form-control" value="{{ employee.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Телефон *</label>
                        <input type="text" name="Phone_number" class="form-control" value="{{ employee.Phone_number }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Дата рождения</label>
                        <input type="date" name="Birth_date" class="form-control" value="{{ employee.Birth_date.strftime('%Y-%m-%d') if employee.Birth_date else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Дата начала работы</label>
                        <input type="date" name="Work_duration" class="form-control" value="{{ employee.Work_duration.strftime('%Y-%m-%d') if employee.Work_duration else '' }}">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="/employees" class="btn btn-secondary">Отмена</a>
                        <button type="button" class="btn btn-primary" onclick="saveEmployee({{ employee.Worker_id }})">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function saveEmployee(workerId) {
    const form = document.getElementById('editEmployeeForm');
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    if (!data.Birth_date) delete data.Birth_date;
    if (!data.Work_duration) delete data.Work_duration;

    fetch(`/api/employees/${workerId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(response => {
        if (response.ok) {
            window.location.href = '/employees';
        } else {
            return response.json().then(err => { throw new Error(err.detail); });
        }
    })
    .catch(error => {
        alert('Ошибка: ' + error.message);
    });
}
</script>
{% endblock %}
